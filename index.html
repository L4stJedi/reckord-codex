<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reckord Codex</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #E10B17;
      --red-dark: #c2030d;
      --red-light: #f32832;
      --black: #111111;
      --dark: #1c1c1c;
      --dark2: #2a2a2a;
      --gray: #555;
      --mid: #888;
      --light: #e8e8e8;
      --bg: #f4f4f4;
      --white: #ffffff;
      --sidebar-w: 240px;
      --green: #27ae60;
      --orange: #e67e22;
      --blue: #2980b9;
      --yellow: #f39c12;
    }
    html, body { height: 100%; font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--black); font-size: 14px; }

    .lang-switcher { display:flex; gap:4px; padding:10px 20px; border-bottom:1px solid #2a2a2a; }
    .lang-btn {
      flex:1; padding:5px 0; border:none; border-radius:4px; cursor:pointer;
      font-family:inherit; font-size:11px; font-weight:600; letter-spacing:0.5px;
      background:#2a2a2a; color:#aaa; transition:all 0.15s;
    }
    .lang-btn:hover { color:white; background:#3a3a3a; }
    .lang-btn.active { background:var(--red); color:white; }

    /* LAYOUT */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w); background: var(--black); color: var(--white);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }
    .sidebar-logo {
      padding: 24px 20px 20px; border-bottom: 1px solid #2a2a2a;
    }
    .logo-mark { display: flex; align-items: center; gap: 10px; }
    .logo-r {
      width: 34px; height: 34px; background: var(--red); color: white;
      font-weight: 800; font-size: 18px; display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .logo-sub { font-size: 10px; color: var(--mid); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

    .nav-section { padding: 16px 0 8px; }
    .nav-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); padding: 0 20px 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
      cursor: pointer; transition: all 0.15s; color: #aaa; font-size: 13px; font-weight: 400;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--dark); color: white; }
    .nav-item.active { background: var(--dark2); color: white; border-left-color: var(--red); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto; background: var(--red); color: white;
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; min-width: 20px; text-align: center;
    }
    .nav-badge.warn { background: var(--orange); }

    .sidebar-user {
      margin-top: auto; padding: 16px 20px; border-top: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--red);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 12px; font-weight: 500; }
    .user-role { font-size: 10px; color: var(--mid); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* TOP BAR */
    .topbar {
      background: white; border-bottom: 1px solid var(--light); padding: 0 28px;
      height: 56px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .topbar-title { font-size: 17px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-search {
      display: flex; align-items: center; gap: 8px; background: var(--bg);
      border: 1px solid var(--light); border-radius: 4px; padding: 6px 12px; width: 240px;
    }
    .topbar-search input { border: none; background: none; outline: none; font-family: inherit; font-size: 13px; width: 100%; }
    .btn {
      padding: 8px 18px; border-radius: 4px; border: none; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    .btn-red { background: var(--red); color: white; }
    .btn-red:hover { background: var(--red-light); }
    .btn-outline { background: white; color: var(--black); border: 1.5px solid var(--light); }
    .btn-outline:hover { background: var(--bg); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-danger { background: #fde8e8; color: var(--red); border: 1.5px solid #f5c6c6; }
    .btn-danger:hover { background: #fbd0d0; }

    /* CONTENT AREA */
    .content { flex: 1; overflow-y: auto; padding: 28px; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: white; border-radius: 6px; padding: 20px 22px;
      border-left: 4px solid var(--red); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card.green { border-left-color: var(--green); }
    .stat-card.orange { border-left-color: var(--orange); }
    .stat-card.blue { border-left-color: var(--blue); }
    .stat-num { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--mid); }
    .stat-change { font-size: 11px; margin-top: 8px; color: var(--green); }
    .stat-change.warn { color: var(--orange); }

    /* TWO COL */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    /* CARD */
    .card {
      background: white; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden; margin-bottom: 20px;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--light);
      display: flex; align-items: center; gap: 10px;
    }
    .card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
    .card-body { padding: 0; }
    .card-body-pad { padding: 20px; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--mid);
      padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--light);
      font-weight: 500; background: #fafafa;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }

    /* STATUS PILLS */
    .pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .pill-green { background: #e8f5e9; color: #2e7d32; }
    .pill-red { background: #fde8e8; color: #b71c1c; }
    .pill-orange { background: #fff3e0; color: #e65100; }
    .pill-blue { background: #e3f2fd; color: #1565c0; }
    .pill-gray { background: #f0f0f0; color: #555; }
    .pill-yellow { background: #fff8e1; color: #f57f17; }

    /* LIST ITEMS */
    .list-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }
    .list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .list-dot-red { background: var(--red); }
    .list-dot-green { background: var(--green); }
    .list-dot-orange { background: var(--orange); }
    .list-dot-blue { background: var(--blue); }
    .list-dot-gray { background: #888; }
    .list-main { flex: 1; font-size: 13px; font-weight: 500; }
    .list-sub { font-size: 11px; color: var(--mid); margin-top: 2px; }
    .list-meta { font-size: 11px; color: var(--mid); text-align: right; }

    /* PROGRESS BAR */
    .progress-wrap { margin: 8px 0; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--mid); margin-bottom: 4px; }
    .progress-bar { height: 6px; background: var(--light); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .fill-red { background: var(--red); }
    .fill-green { background: var(--green); }
    .fill-orange { background: var(--orange); }
    .fill-blue { background: var(--blue); }

    /* ALERT */
    .alert {
      padding: 12px 16px; border-radius: 4px; margin-bottom: 12px;
      display: flex; align-items: flex-start; gap: 10px; font-size: 13px;
    }
    .alert-warn { background: #fff8e1; border-left: 3px solid var(--yellow); }
    .alert-err { background: #fde8e8; border-left: 3px solid var(--red); }
    .alert-ok { background: #e8f5e9; border-left: 3px solid var(--green); }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* FORM */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray); }
    input[type=text], input[type=date], input[type=email], input[type=number], select, textarea {
      border: 1.5px solid var(--light); border-radius: 4px; padding: 9px 12px;
      font-family: inherit; font-size: 13px; color: var(--black); outline: none;
      transition: border-color 0.15s; width: 100%; background: white;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--red); }
    textarea { resize: vertical; min-height: 80px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--light); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 8px; width: 560px; max-width: 95vw;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--light);
      display: flex; align-items: center; gap: 12px;
    }
    .modal-title { font-size: 15px; font-weight: 700; flex: 1; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--mid); padding: 0; line-height: 1; }
    .modal-body { padding: 24px; }

    /* SECTION HEADER */
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .section-title { font-size: 20px; font-weight: 800; flex: 1; }
    .section-sub { font-size: 13px; color: var(--mid); }

    /* TABS */
    .tab-bar { display: flex; border-bottom: 2px solid var(--light); margin-bottom: 20px; }
    .tab {
      padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer;
      color: var(--mid); border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--black); }
    .tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

    /* AVATAR */
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .av-red { background: #fde8e8; color: var(--red); }
    .av-blue { background: #e3f2fd; color: var(--blue); }
    .av-green { background: #e8f5e9; color: var(--green); }
    .av-orange { background: #fff3e0; color: var(--orange); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--mid); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* TAG */
    .tag { display: inline-block; background: var(--bg); border: 1px solid var(--light); border-radius: 3px; padding: 2px 8px; font-size: 11px; color: var(--gray); margin: 2px; }

    /* BREADCRUMB */
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--mid); margin-bottom: 16px; }
    .breadcrumb a { color: var(--red); text-decoration: none; cursor: pointer; }
    .breadcrumb-sep { color: var(--light); }

    /* CHIP ROW */
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); border: 1px solid var(--light); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .chip.active { background: var(--red); border-color: var(--red); color: white; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    /* INFO TABLE (detail view key-value) */
    .info-table { width: 100%; }
    .info-table tr td:first-child { color: var(--mid); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 20px; width: 38%; vertical-align: top; }
    .info-table tr td:last-child { padding: 8px 20px 8px 0; font-size: 13px; font-weight: 500; }
    .info-table tr { border-bottom: 1px solid #f5f5f5; }
    .info-table tr:last-child { border-bottom: none; }

    /* Budget detail table */
    .budget-table { width: 100%; }
    .budget-table td { padding: 10px 20px; font-size: 13px; }
    .budget-table td:last-child { text-align: right; font-weight: 600; }
    .budget-table tr { border-bottom: 1px solid #f5f5f5; }
    .budget-table tr:last-child { border-bottom: none; }

    /* Toast notifications */
    #toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { padding:10px 18px; border-radius:6px; font-size:13px; font-weight:500; box-shadow:0 4px 16px rgba(0,0,0,0.15); animation:slideIn 0.2s ease; max-width:320px; }
    .toast-ok { background:#27ae60; color:white; }
    .toast-err { background:#E10B17; color:white; }
    .toast-warn { background:#e67e22; color:white; }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

    /* Mobile sidebar toggle */
    #mob-sidebar-btn { display:none; }
    @media(max-width:768px) {
      .sidebar { position:fixed; left:-100%; top:0; height:100%; z-index:200; transition:left 0.25s; }
      .sidebar.mob-open { left:0; }
      #mob-sidebar-btn { display:flex; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }

    /* Status select in topbar */
    .topbar select {
      border: 1.5px solid var(--light); border-radius: 4px; padding: 6px 10px;
      font-family: inherit; font-size: 13px; outline: none; background: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-r">R</div>
        <div>
          <div class="logo-text">RECKORD</div>
          <div class="logo-sub">Operations Platform</div>
        </div>
      </div>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('cs')">CS</button>
      <button class="lang-btn" onclick="setLang('pl')">PL</button>
    </div>
    <div class="nav-section">
      <div class="nav-label" data-i18n="nav.main">Main</div>
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')"><span class="icon">&#128202;</span><span data-i18n="nav.dashboard">Dashboard</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label" data-i18n="nav.operations">Operations</div>
      <div class="nav-item" id="nav-calendar" onclick="navigate('calendar')"><span class="icon">&#128197;</span><span data-i18n="nav.calendar">Calendar</span></div>
      <div class="nav-item" id="nav-projects" onclick="navigate('projects')"><span class="icon">&#128193;</span><span data-i18n="nav.projects">Projects</span></div>
      <div class="nav-item" id="nav-equipment" onclick="navigate('equipment')"><span class="icon">&#128230;</span><span data-i18n="nav.equipment">Equipment</span></div>
      <div class="nav-item" id="nav-fleet" onclick="navigate('fleet')"><span class="icon">&#128667;</span><span data-i18n="nav.fleet">Fleet</span></div>
      <div class="nav-item" id="nav-crew" onclick="navigate('crew')"><span class="icon">&#128101;</span><span data-i18n="nav.crew">Crew</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label" data-i18n="nav.commercial">Commercial</div>
      <div class="nav-item" id="nav-clients" onclick="navigate('clients')"><span class="icon">&#127970;</span><span data-i18n="nav.clients">Clients</span></div>
      <div class="nav-item" id="nav-offers" onclick="navigate('offers')"><span class="icon">&#128176;</span><span data-i18n="nav.offers">Offers</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label" data-i18n="nav.reports">Reports</div>
      <div class="nav-item" id="nav-reports" onclick="navigate('reports')"><span class="icon">&#128200;</span><span data-i18n="nav.overview">Reporting</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-item" id="nav-settings" onclick="navigate('settings')"><span class="icon">&#9881;</span><span data-i18n="nav.settings">Settings</span></div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div>
        <div class="user-name" id="user-name">Loading...</div>
        <div class="user-role" id="user-role"></div>
      </div>
      <a href="/logout" style="margin-left:auto;color:#555;font-size:18px;text-decoration:none" title="Sign out">&#9099;</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main">
    <button id="mob-sidebar-btn" style="position:fixed;top:12px;left:12px;z-index:300;background:#111;border:none;color:white;width:36px;height:36px;border-radius:6px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center" aria-label="Menu">&#9776;</button>
    <div id="content"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-project" onclick="closeModalOutside(event,'modal-project')">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <div class="modal-title" id="modal-project-title">&#128193; Project</div>
      <button class="modal-close" onclick="closeModal('modal-project')">&#215;</button>
    </div>
    <div class="modal-body" id="modal-project-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-client" onclick="closeModalOutside(event,'modal-client')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-client-title">&#127970; Client</div>
      <button class="modal-close" onclick="closeModal('modal-client')">&#215;</button>
    </div>
    <div class="modal-body" id="modal-client-body"></div>
  </div>
</div>

<!-- MODAL: EQUIPMENT -->
<div class="modal-overlay" id="modal-equipment" onclick="closeModalOutside(event,'modal-equipment')">
  <div class="modal"><div class="modal-header"><div class="modal-title">&#128230; Equipment</div><button class="modal-close" onclick="closeModal('modal-equipment')">&#215;</button></div><div class="modal-body"></div></div>
</div>

<!-- MODAL: FLEET -->
<div class="modal-overlay" id="modal-fleet" onclick="closeModalOutside(event,'modal-fleet')">
  <div class="modal"><div class="modal-header"><div class="modal-title">&#128667; Vehicle</div><button class="modal-close" onclick="closeModal('modal-fleet')">&#215;</button></div><div class="modal-body"></div></div>
</div>

<!-- MODAL: CREW -->
<div class="modal-overlay" id="modal-crew" onclick="closeModalOutside(event,'modal-crew')">
  <div class="modal"><div class="modal-header"><div class="modal-title">&#128101; Crew Member</div><button class="modal-close" onclick="closeModal('modal-crew')">&#215;</button></div><div class="modal-body"></div></div>
</div>

<!-- MODAL: OFFER -->
<div class="modal-overlay" id="modal-offer" onclick="closeModalOutside(event,'modal-offer')">
  <div class="modal" style="max-width:640px"><div class="modal-header"><div class="modal-title">&#128176; Offer</div><button class="modal-close" onclick="closeModal('modal-offer')">&#215;</button></div><div class="modal-body"></div></div>
</div>

<!-- MODAL: ASSIGN -->
<div class="modal-overlay" id="modal-assign" onclick="closeModalOutside(event,'modal-assign')">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title">+ Assign</div>
      <button class="modal-close" onclick="closeModal('modal-assign')">×</button>
    </div>
    <div class="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
